# Nginx config for https://py-api.joinroster.co
# FastAPI app runs on 127.0.0.1:8000 (py-api.service)
#
# 1. Copy to sites-available:
#    sudo cp deploy/nginx-py-api.joinroster.co.conf /etc/nginx/sites-available/py-api.joinroster.co
#
# 2. Enable and test:
#    sudo ln -sf /etc/nginx/sites-available/py-api.joinroster.co /etc/nginx/sites-enabled/
#    sudo nginx -t
#
# 3. Get SSL cert (DNS must point py-api.joinroster.co to this server):
#    sudo certbot --nginx -d py-api.joinroster.co
#
# 4. Reload Nginx:
#    sudo systemctl reload nginx

server {
    listen 80;
    server_name py-api.joinroster.co;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}
