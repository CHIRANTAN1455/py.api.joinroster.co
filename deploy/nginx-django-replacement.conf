# Replacement for /etc/nginx/sites-available/django
# Proxies py-api.joinroster.co to FastAPI (127.0.0.1:8000) instead of Django unix socket
#
# Deploy:
#   sudo cp deploy/nginx-django-replacement.conf /etc/nginx/sites-available/django
#   sudo nginx -t
#   sudo systemctl reload nginx

server {
    server_name py-api.joinroster.co;
    client_max_body_size 20M;

    location = /favicon.ico { access_log off; log_not_found off; }

    location / {
        include proxy_params;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/py-api.joinroster.co/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/py-api.joinroster.co/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = py-api.joinroster.co) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name py-api.joinroster.co;
    return 404; # managed by Certbot
}
